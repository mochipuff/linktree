<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Link Tree</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-slate-50 to-gray-100 font-sans antialiased select-none">

  <div class="min-h-screen flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-5xl">
      
      <div class="text-center mb-6 md:mb-8">
        <div class="inline-flex items-center justify-center bg-white/70 backdrop-blur-sm rounded-full px-5 py-2 shadow-sm border border-gray-200/60">
          <i class="fas fa-link text-indigo-500 mr-2 text-sm"></i>
          <span class="text-gray-700 text-sm font-medium tracking-wide">Link Tree</span>
        </div>
        <h1 class="text-2xl md:text-3xl font-extrabold mt-4 text-gray-800 tracking-tight">Find out about me</h1>
        <p class="text-gray-500 text-sm mt-1 max-w-md mx-auto"><code class="bg-gray-200/80 px-1.5 py-0.5 rounded text-indigo-700 text-xs font-mono">Don't shy :^</code></p>
      </div>

      <div id="invalidParamAlert" class="w-full mb-6 hidden transition-all duration-200"></div>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
        
        <a href="https://myanimelist.com" target="_blank" rel="noopener noreferrer" 
           class="group bg-white rounded-2xl shadow-md hover:shadow-xl transition-all duration-300 p-5 flex flex-col items-center text-center border border-gray-100 hover:border-indigo-200 hover:-translate-y-1">
          <div class="w-14 h-14 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-600 text-2xl mb-3 group-hover:bg-indigo-100 transition">
            <i class="fas fa-book-open"></i>
          </div>
          <h2 class="font-bold text-gray-800 text-lg">MyAnimeList</h2>
          <p class="text-xs text-gray-400 mt-1">anime & manga database</p>
          <div class="mt-3 text-indigo-500 text-sm font-medium flex items-center gap-1 opacity-70 group-hover:opacity-100">
            <span>Visit</span> <i class="fas fa-arrow-right text-xs"></i>
          </div>
        </a>

        <a href="https://mydramalist.com" target="_blank" rel="noopener noreferrer" 
           class="group bg-white rounded-2xl shadow-md hover:shadow-xl transition-all duration-300 p-5 flex flex-col items-center text-center border border-gray-100 hover:border-emerald-200 hover:-translate-y-1">
          <div class="w-14 h-14 rounded-full bg-emerald-50 flex items-center justify-center text-emerald-600 text-2xl mb-3 group-hover:bg-emerald-100 transition">
            <i class="fas fa-tv"></i>
          </div>
          <h2 class="font-bold text-gray-800 text-lg">MyDramaList</h2>
          <p class="text-xs text-gray-400 mt-1">asian dramas & movies</p>
          <div class="mt-3 text-emerald-500 text-sm font-medium flex items-center gap-1 opacity-70 group-hover:opacity-100">
            <span>Visit</span> <i class="fas fa-arrow-right text-xs"></i>
          </div>
        </a>

        <a href="https://open.spotify.com" target="_blank" rel="noopener noreferrer" 
           class="group bg-white rounded-2xl shadow-md hover:shadow-xl transition-all duration-300 p-5 flex flex-col items-center text-center border border-gray-100 hover:border-green-300 hover:-translate-y-1">
          <div class="w-14 h-14 rounded-full bg-green-50 flex items-center justify-center text-green-600 text-2xl mb-3 group-hover:bg-green-100 transition">
            <i class="fab fa-spotify"></i>
          </div>
          <h2 class="font-bold text-gray-800 text-lg">Spotify</h2>
          <p class="text-xs text-gray-400 mt-1">music & podcasts</p>
          <div class="mt-3 text-green-600 text-sm font-medium flex items-center gap-1 opacity-70 group-hover:opacity-100">
            <span>Visit</span> <i class="fas fa-arrow-right text-xs"></i>
          </div>
        </a>
      </div>

      <div class="mt-8 text-center text-xs text-gray-400 border-t border-gray-200/60 pt-6">
        <div class="flex flex-wrap justify-center gap-x-4 gap-y-1">
          <a href="https://github.com">
              <span><i class="fas fa-code-branch mr-1"></i> <code class="bg-gray-100 px-1 rounded">Github</code></span>
          </a>
        </div>
        <p class="mt-2 text-gray-400/80">©2026 Fikk Link Tree | Infinityfree</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
